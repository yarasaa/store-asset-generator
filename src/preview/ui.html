<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StoreKit Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0D12;
    --surface: #141821;
    --surface-hi: #1C2230;
    --border: #262D3D;
    --text: #E8EBF0;
    --text-dim: #8B93A7;
    --accent: #6366F1;
    --accent-hi: #818CF8;
    --danger: #EF4444;
    --ok: #10B981;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr 360px;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .logo span { color: var(--accent-hi); }
  .sidebar-subtitle {
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .mockup-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .mockup-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
  }
  .mockup-item:hover { background: var(--surface-hi); }
  .mockup-item.active {
    background: var(--surface-hi);
    border-color: var(--accent);
  }
  .mockup-thumb {
    width: 36px;
    height: 60px;
    border-radius: 6px;
    background: var(--bg);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }
  .mockup-name {
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mockup-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Main preview ── */
  .main {
    background: var(--bg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .preview-stage {
    padding: 40px;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-image {
    max-width: 100%;
    max-height: calc(100vh - 80px);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: block;
  }
  .preview-empty {
    text-align: center;
    color: var(--text-dim);
  }
  .preview-empty h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  /* ── Right panel ── */
  .panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    transition: all 0.12s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .field input, .field textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    transition: border 0.12s;
  }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field textarea {
    resize: vertical;
    min-height: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 60px;
    gap: 8px;
  }
  .color-swatch {
    height: 38px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    cursor: pointer;
    padding: 0;
  }
  .panel-actions {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  button {
    flex: 1;
    padding: 11px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface-hi);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
  }
  button:hover { background: var(--border); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover { background: var(--accent-hi); }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .metadata-section {
    margin-bottom: 24px;
  }
  .metadata-section h3 {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text);
  }
  .char-count {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .char-count.over { color: var(--danger); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 10px 16px;
    background: var(--surface-hi);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--ok); }
  .toast.error { border-color: var(--danger); }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Store<span>Kit</span></div>
      <div class="sidebar-subtitle" id="project-name">Loading…</div>
    </div>
    <div class="mockup-list" id="mockup-list"></div>
  </aside>

  <!-- Main preview -->
  <main class="main">
    <div class="preview-stage" id="preview-stage">
      <div class="preview-empty">
        <h2>Select a mockup</h2>
        <div>Pick an item from the left to preview and edit</div>
      </div>
    </div>
  </main>

  <!-- Right panel -->
  <aside class="panel">
    <div class="panel-tabs">
      <button class="tab active" data-tab="design">Design</button>
      <button class="tab" data-tab="metadata">Metadata</button>
    </div>

    <div class="panel-content" id="panel-design">
      <div class="field">
        <label>Headline</label>
        <input type="text" id="headline" placeholder="e.g. Track your progress" />
      </div>
      <div class="field">
        <label>Subheadline</label>
        <input type="text" id="subheadline" placeholder="Optional supporting text" />
      </div>
      <div class="field">
        <label>Accent color</label>
        <div class="field-row">
          <input type="text" id="accent-hex" placeholder="#6366F1" />
          <input type="color" id="accent-color" class="color-swatch" value="#6366F1" />
        </div>
      </div>
      <div class="field">
        <label>Background style</label>
        <select id="bg-style" style="width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:13px;">
          <option value="gradient">Gradient</option>
          <option value="mesh">Mesh gradient</option>
          <option value="solid">Solid color</option>
          <option value="blur">Blurred screenshot</option>
        </select>
      </div>
      <div class="field">
        <label>Custom HTML (advanced)</label>
        <textarea id="custom-html" placeholder="Leave empty to keep current HTML"></textarea>
      </div>
    </div>

    <div class="panel-content" id="panel-metadata" style="display:none;">
      <div class="metadata-section">
        <h3>App Store</h3>
        <div class="field">
          <label>Name (30)</label>
          <input type="text" id="as-name" maxlength="30" />
          <div class="char-count" id="as-name-count">0 / 30</div>
        </div>
        <div class="field">
          <label>Subtitle (30)</label>
          <input type="text" id="as-subtitle" maxlength="30" />
          <div class="char-count" id="as-subtitle-count">0 / 30</div>
        </div>
        <div class="field">
          <label>Description (4000)</label>
          <textarea id="as-description" maxlength="4000" rows="8"></textarea>
          <div class="char-count" id="as-description-count">0 / 4000</div>
        </div>
        <div class="field">
          <label>Keywords (100)</label>
          <input type="text" id="as-keywords" maxlength="100" />
          <div class="char-count" id="as-keywords-count">0 / 100</div>
        </div>
      </div>

      <div class="metadata-section">
        <h3>Play Store</h3>
        <div class="field">
          <label>Title (30)</label>
          <input type="text" id="ps-title" maxlength="30" />
          <div class="char-count" id="ps-title-count">0 / 30</div>
        </div>
        <div class="field">
          <label>Short description (80)</label>
          <input type="text" id="ps-short" maxlength="80" />
          <div class="char-count" id="ps-short-count">0 / 80</div>
        </div>
        <div class="field">
          <label>Full description (4000)</label>
          <textarea id="ps-full" maxlength="4000" rows="8"></textarea>
          <div class="char-count" id="ps-full-count">0 / 4000</div>
        </div>
      </div>
    </div>

    <div class="panel-actions">
      <button id="save-btn">Save</button>
      <button class="primary" id="regen-btn">Regenerate</button>
    </div>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const state = {
    config: null,
    metadata: null,
    mockups: [],
    selected: null,
    activeLocale: "en",
  };

  const $ = (id) => document.getElementById(id);

  function toast(msg, kind = "ok") {
    const t = $("toast");
    t.textContent = msg;
    t.className = `toast show ${kind}`;
    setTimeout(() => t.classList.remove("show"), 2400);
  }

  async function loadConfig() {
    try {
      const res = await fetch("/api/config");
      const data = await res.json();
      if (!data.empty) {
        state.config = data;
        if (data.project?.project_name) {
          $("project-name").textContent = data.project.project_name;
        }
      }
    } catch (e) {
      console.error(e);
    }
  }

  async function loadMetadata() {
    try {
      const res = await fetch("/api/metadata");
      const data = await res.json();
      if (!data.empty) {
        state.metadata = data;
        fillMetadataFields();
      }
    } catch (e) {
      console.error(e);
    }
  }

  async function loadMockups() {
    try {
      const res = await fetch("/api/mockups");
      const data = await res.json();
      state.mockups = data.mockups || [];
      renderMockupList();
    } catch (e) {
      console.error(e);
    }
  }

  function renderMockupList() {
    const list = $("mockup-list");
    if (state.mockups.length === 0) {
      list.innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:12px;text-align:center">No mockups yet. Run <br/><code style="color:var(--accent-hi)">claude "generate_all"</code></div>';
      return;
    }
    list.innerHTML = state.mockups.map((m, i) => `
      <div class="mockup-item" data-idx="${i}">
        <div class="mockup-thumb" style="background-image:url('${m.url}')"></div>
        <div style="min-width:0;flex:1">
          <div class="mockup-name">${escapeHtml(m.name)}</div>
          <div class="mockup-meta">${escapeHtml(m.rel.replace(m.name, '').replace(/\/$/, ''))}</div>
        </div>
      </div>
    `).join("");
    list.querySelectorAll(".mockup-item").forEach((el) => {
      el.addEventListener("click", () => selectMockup(parseInt(el.dataset.idx, 10)));
    });
    if (state.mockups.length > 0 && !state.selected) {
      selectMockup(0);
    }
  }

  function selectMockup(idx) {
    state.selected = state.mockups[idx];
    document.querySelectorAll(".mockup-item").forEach((el, i) => {
      el.classList.toggle("active", i === idx);
    });
    const stage = $("preview-stage");
    stage.innerHTML = `<img class="preview-image" src="${state.selected.url}?t=${Date.now()}"/>`;
  }

  function fillMetadataFields() {
    const locale = state.metadata?.locales?.[state.activeLocale];
    if (!locale) return;
    const as = locale.app_store;
    const ps = locale.play_store;
    if (as) {
      $("as-name").value = as.name ?? "";
      $("as-subtitle").value = as.subtitle ?? "";
      $("as-description").value = as.description ?? "";
      $("as-keywords").value = as.keywords ?? "";
    }
    if (ps) {
      $("ps-title").value = ps.title ?? "";
      $("ps-short").value = ps.short_description ?? "";
      $("ps-full").value = ps.full_description ?? "";
    }
    updateAllCharCounts();
  }

  function updateAllCharCounts() {
    const pairs = [
      ["as-name", 30], ["as-subtitle", 30], ["as-description", 4000],
      ["as-keywords", 100], ["ps-title", 30], ["ps-short", 80], ["ps-full", 4000],
    ];
    for (const [id, max] of pairs) {
      const input = $(id);
      const counter = $(id + "-count");
      if (!input || !counter) continue;
      const len = input.value.length;
      counter.textContent = `${len} / ${max}`;
      counter.classList.toggle("over", len > max);
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  // Tab switching
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      const target = tab.dataset.tab;
      $("panel-design").style.display = target === "design" ? "block" : "none";
      $("panel-metadata").style.display = target === "metadata" ? "block" : "none";
    });
  });

  // Color sync
  $("accent-color").addEventListener("input", (e) => { $("accent-hex").value = e.target.value; });
  $("accent-hex").addEventListener("input", (e) => {
    if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) $("accent-color").value = e.target.value;
  });

  // Char counts
  document.querySelectorAll("#panel-metadata input, #panel-metadata textarea").forEach((el) => {
    el.addEventListener("input", updateAllCharCounts);
  });

  // Save
  $("save-btn").addEventListener("click", async () => {
    try {
      // Save metadata if on metadata tab
      if (state.metadata) {
        const locale = state.metadata.locales[state.activeLocale] ?? {};
        locale.app_store = locale.app_store ?? {};
        locale.app_store.name = $("as-name").value;
        locale.app_store.subtitle = $("as-subtitle").value;
        locale.app_store.description = $("as-description").value;
        locale.app_store.keywords = $("as-keywords").value;
        locale.play_store = locale.play_store ?? {};
        locale.play_store.title = $("ps-title").value;
        locale.play_store.short_description = $("ps-short").value;
        locale.play_store.full_description = $("ps-full").value;
        state.metadata.locales[state.activeLocale] = locale;
        await fetch("/api/metadata", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(state.metadata),
        });
      }

      // Save design overrides to config
      if (state.config && state.selected) {
        state.config.preview_overrides = state.config.preview_overrides ?? {};
        state.config.preview_overrides[state.selected.rel] = {
          headline: $("headline").value,
          subheadline: $("subheadline").value,
          accent: $("accent-hex").value,
          bg_style: $("bg-style").value,
          custom_html: $("custom-html").value || undefined,
        };
        await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(state.config),
        });
      }
      toast("Saved");
    } catch (e) {
      toast("Save failed: " + e.message, "error");
    }
  });

  // Regenerate — simple version uses custom HTML if provided
  $("regen-btn").addEventListener("click", async () => {
    if (!state.selected) {
      toast("Select a mockup first", "error");
      return;
    }
    const html = $("custom-html").value;
    if (!html) {
      toast("Paste HTML in the Custom HTML field first", "error");
      return;
    }
    $("regen-btn").disabled = true;
    try {
      const res = await fetch("/api/regenerate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          html,
          output_path: state.selected.path,
          width: 1290,
          height: 2796,
        }),
      });
      const result = await res.json();
      if (result.success) {
        toast("Regenerated");
        selectMockup(state.mockups.indexOf(state.selected));
      } else {
        toast("Render failed: " + (result.error || "unknown"), "error");
      }
    } catch (e) {
      toast("Request failed: " + e.message, "error");
    } finally {
      $("regen-btn").disabled = false;
    }
  });

  // Init
  (async () => {
    await loadConfig();
    await loadMetadata();
    await loadMockups();
  })();
})();
</script>
</body>
</html>
